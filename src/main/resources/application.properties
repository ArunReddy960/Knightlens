spring.datasource.url=jdbc:postgresql://localhost:5432/chessdna
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
stockfish.path=${STOCKFISH_PATH}
claude.api.key=${CLAUDE_API_KEY}
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-6
claude.api.max-tokens=1000
stockfish.depth=18
stockfish.pool-size=8

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true